<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf40;
            --premium-grad: linear-gradient(90deg, #ff007f, #ffcf40, #00d4ff);
        }

        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* --- FLOATING TITLE (No background, purely animated) --- */
        .scrolling-title {
            position: fixed; width: 100%; text-align: center; z-index: 500; top: 5%;
            font-family: 'Cinzel', serif; font-size: 2.2rem;
            background: var(--premium-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: none; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            animation: floatingTitle 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatingTitle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        /* --- TREASURE GATE --- */
        #treasure-screen {
            height: 100vh; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: fixed; top: 0; left:0; z-index: 9999;
            background: #000; transition: 1s; cursor: pointer;
        }

        .treasure-box { font-size: 100px; filter: drop-shadow(0 0 30px var(--gold)); animation: bounce 1.2s infinite; }
        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.1);} }

        /* --- GALLERY --- */
        #main-content { display: none; height: 100vh; overflow: hidden; }
        
        .section {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center;
            background-size: cover; background-position: center; position: absolute;
            top: 0; left: 0; opacity: 0; transition: 1.5s ease-in-out;
        }

        .section.active { opacity: 1; }

        .glass-card {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            padding: 15px 30px; border-radius: 10px; z-index: 10;
            border-left: 4px solid var(--gold); transform: translateY(30px);
            position: absolute; bottom: 15%;
        }

        /* --- LOCK SCREEN (Fixed Password Logic) --- */
        #lock-screen {
            display: none; height: 100vh; width: 100%; position: fixed; top:0; z-index: 10000;
            background: #000; flex-direction: column; justify-content: center; align-items: center;
        }

        .lock-card { padding: 40px; border: 2px solid var(--gold); background: #111; text-align: center; box-shadow: 0 0 40px var(--gold); width: 80%; max-width: 400px; }
        .pass-input { width: 90%; padding: 12px; margin: 20px 0; background: #000; color: var(--gold); border: 1px solid var(--gold); text-align: center; font-size: 1.1rem; border-radius: 5px; }

        /* --- FINAL REVEAL --- */
        #final-reveal {
            display: none; height: 100vh; width: 100%; position: fixed; top: 0; z-index: 11000;
            background: radial-gradient(circle, #220000, #000); flex-direction: column; justify-content: center; align-items: center;
        }

        .box-3d { padding: 40px; border: 8px ridge var(--gold); background: rgba(0,0,0,0.8); text-align: center; box-shadow: 0 0 60px #ff007f; }

        .falling-item { position: fixed; top: -50px; z-index: 12000; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 15000;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold);
            color: var(--gold); padding: 10px; border-radius: 50%; cursor: pointer; display: none;
        }
    </style>
</head>
<body onclick="openSurprise()">

    <audio id="bg-music" loop>
        <source src="nastelbom-happy-mood-463426.mp3" type="audio/mpeg">
    </audio>

    <button id="music-control" onclick="toggleMusic(event)">🎵</button>

    <div class="scrolling-title" id="p-title">KING ANKIT BHAIYA</div>

    <div id="treasure-screen">
        <h1 style="font-family:Cinzel; color:var(--gold); letter-spacing:5px;">FOR YOU</h1>
        <div class="treasure-box">🎁</div>
        <p style="color:white; opacity:0.8; margin-top:20px;">TAP TO OPEN SURPRISE</p>
    </div>

    <div id="main-content">
        <div class="section active" style="background-image: url('0bbaa0781a9640d5b41a66719e4340aa.jpg');">
            <div class="glass-card"><h2>Birthday Vibes</h2></div>
        </div>
        <div class="section" style="background-image: url('10f87133a66246f0b6a6b0fc372bc24c.jpg');">
            <div class="glass-card"><h2>The Legend</h2></div>
        </div>
        <div class="section" style="background-image: url('3d1874fa930a4eecbbe867974094598f.jpg');">
            <div class="glass-card"><h2>Coolest Personality</h2></div>
        </div>
        <div class="section" style="background-image: url('50501fecbf7145be96c2f133fc866201.jpg');">
            <div class="glass-card"><h2>Success & Glory</h2></div>
        </div>
        <div class="section" style="background-image: url('ab0f63c9ebfb43f2a8b5b5484ff2fb3a.jpg');">
            <div class="glass-card"><h2>Golden Heart</h2></div>
        </div>
        <div class="section" style="background-image: url('Screenshot_20260414_085657_WhatsApp.jpg');">
            <div class="glass-card"><h2>Memories Forever</h2></div>
        </div>
    </div>

    <div id="lock-screen">
        <div class="lock-card">
            <h2 style="color:var(--gold); font-family:Cinzel;">SECURITY CHECK</h2>
            <input type="text" id="pass" class="pass-input" placeholder="Hint: I am a birthday boy">
            <button onclick="verifyPass()" style="padding:12px 30px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; border-radius:5px; color:black;">ENTER SURPRISE</button>
        </div>
    </div>

    <div id="final-reveal">
        <div class="box-3d">
            <h1 style="font-family:'Dancing Script'; font-size: 3.5rem; margin:0; color:white;">Happy Birthday<br><span style="color:var(--gold)">Ankit Bhaiya</span></h1>
        </div>
        <p style="margin-top:30px; color:var(--gold); letter-spacing:3px; font-weight:bold;">DEVELOPED BY ARUSH ❤️</p>
    </div>

    <script>
        let isStarted = false;
        const music = document.getElementById('bg-music');

        function openSurprise() {
            if(isStarted) return;
            isStarted = true;

            // Audio starts here and stays till the end
            music.play().catch(e => console.log("Music play error"));
            document.getElementById('music-control').style.display = "block";

            const gate = document.getElementById('treasure-screen');
            gate.style.opacity = "0";
            
            setTimeout(() => {
                gate.style.display = "none";
                document.getElementById('main-content').style.display = "block";
                document.getElementById('p-title').style.display = "block";
                spawnItems(['✨', '⭐'], 100);
                startAutoSlideshow();
            }, 1000);
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (music.paused) { music.play(); e.target.innerHTML = "🎵"; }
            else { music.pause(); e.target.innerHTML = "🔇"; }
        }

        function startAutoSlideshow() {
            const sections = document.querySelectorAll('.section');
            let current = 0;
            
            const slideInterval = setInterval(() => {
                sections[current].classList.remove('active');
                current++;
                
                if(current >= sections.length) {
                    clearInterval(slideInterval);
                    setTimeout(showLock, 1500);
                    return;
                }
                sections[current].classList.add('active');
            }, 4000); // 4 seconds per image
        }

        function showLock() {
            document.getElementById('main-content').style.display = "none";
            document.getElementById('p-title').style.display = "none";
            document.getElementById('lock-screen').style.display = "flex";
        }

        function verifyPass() {
            // Trim aur lowercase takki space ya capital letter ki galti na ho
            const p = document.getElementById('pass').value.toLowerCase().trim();
            if(p === "i am a birthday boy") {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('final-reveal').style.display = "flex";
                spawnItems(['❤️', '🍫', '🎂', '🎉'], 120);
            } else {
                alert("Incorrect Password! Hint: Check the placeholder text.");
            }
        }

        function spawnItems(items, speed) {
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'falling-item';
                div.innerHTML = items[Math.floor(Math.random()*items.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.fontSize = Math.random() * 20 + 20 + 'px';
                div.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 4000);
            }, speed);
        }
    </script>
</body>
</html>
